name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pure-Java library. liteparse-java (incl. its linux-x86_64 native bundle, used by the
      # end-to-end test) is resolved from its GitHub Releases via the ivy repo in build.gradle.kts.
      - name: Build & test
        run: ./gradlew build --no-daemon --console=plain
